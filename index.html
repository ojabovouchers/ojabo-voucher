<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/png" href="%VITE_SUPABASE_URL%/storage/v1/object/public/branding/favicon.png" id="favicon-link" />
    <link rel="apple-touch-icon" href="%VITE_SUPABASE_URL%/storage/v1/object/public/branding/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Cathedral Vouchers" />
    <meta name="theme-color" content="#000000" />
    <title>Cathedral Vouchers</title>
    <script>
      // Aplica título salvo ANTES do React carregar — elimina o flash
      try {
        var t = localStorage.getItem('app_title');
        if (t) { document.title = t; }
      } catch(e) {}

      // Atualiza APENAS o título dinamicamente — não mexe no manifest
      // (mexer no manifest invalida o beforeinstallprompt e quebra o botão de instalar)
      window.addEventListener('load', function() {
        try {
          var SUPABASE_URL = '%VITE_SUPABASE_URL%'
          fetch(SUPABASE_URL + '/rest/v1/settings?key=in.(app_title,sidebar_name)&select=key,value', {
            headers: {
              'apikey': '%VITE_SUPABASE_ANON_KEY%',
              'Authorization': 'Bearer %VITE_SUPABASE_ANON_KEY%'
            }
          }).then(function(r) { return r.json() })
            .then(function(data) {
              var map = {}
              data.forEach(function(s) { map[s.key] = s.value })
              var appName = map.app_title || 'Cathedral Vouchers'
              var shortName = map.sidebar_name || appName
              // Salva no localStorage para uso do React
              if (map.app_title) localStorage.setItem('app_title', map.app_title)
              if (map.sidebar_name) localStorage.setItem('sidebar_name', map.sidebar_name)
              // Atualiza título e meta do iOS
              document.title = appName
              var appleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]')
              if (appleMeta) appleMeta.setAttribute('content', shortName)
            }).catch(function() {})
        } catch(e) {}
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
        })
      }
    </script>
  </body>
</html>
