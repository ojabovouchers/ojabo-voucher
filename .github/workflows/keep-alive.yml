name: Keep Supabase Alive

on:
  schedule:
    # Roda a cada 3 dias (às 08:00 UTC = 05:00 horário de Brasília)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub se precisar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/settings?select=key&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "Ping enviado com sucesso!"
